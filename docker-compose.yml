services:
  # ─── Database ──────────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    container_name: alvinai-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: alvinai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MinIO ─────────────────────────────────────────────────────
  minio:
    image: minio/minio
    container_name: alvinai-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend (FastAPI) ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: alvinai-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Celery Worker ─────────────────────────────────────────────
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: alvinai-celery
    restart: unless-stopped
    command: uv run celery -A app.celery_app worker -l info
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery_app inspect ping --timeout 10"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s

  # ─── Celery Beat Scheduler ─────────────────────────────────────
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: alvinai-beat
    restart: unless-stopped
    command: uv run celery -A app.celery_app beat -l info
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Frontend (SvelteKit) ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: alvinai-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Caddy (Reverse Proxy + Automatic TLS) ─────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: alvinai-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── vLLM Blue (Active Inference) ──────────────────────────────
  vllm_blue:
    image: vllm/vllm-openai:latest
    container_name: alvinai-vllm-blue
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      HF_TOKEN: ${HF_TOKEN}
    volumes:
      - vllm_cache:/root/.cache/huggingface
    command: >
      --model ${VLLM_MODEL_ID}
      --served-model-name ${VLLM_MODEL_NAME}
      --port 8080
      --quantization awq
      --gpu-memory-utilization 0.85
      --max-model-len 4096
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ─── vLLM Green (Standby for Hot-Swap) ─────────────────────────
  vllm_green:
    image: vllm/vllm-openai:latest
    container_name: alvinai-vllm-green
    restart: unless-stopped
    profiles:
      - green
    ports:
      - "8081:8081"
    environment:
      HF_TOKEN: ${HF_TOKEN}
    volumes:
      - vllm_cache:/root/.cache/huggingface
    command: >
      --model ${VLLM_GREEN_MODEL_ID:-sarfarazflow/alvinai-7b-awq-20250101}
      --served-model-name ${VLLM_MODEL_NAME}
      --port 8081
      --quantization awq
      --gpu-memory-utilization 0.85
      --max-model-len 4096
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

volumes:
  pgdata:
  redisdata:
  miniodata:
  caddydata:
  caddyconfig:
  vllm_cache:
