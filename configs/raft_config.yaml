# ──────────────────────────────────────────────────────────────
# AlvinAI — RAFT Training Configuration
# Stage 2 of 3: Retrieval-Augmented Fine-Tuning
# Teaches the model to use oracle docs, reject distractors, abstain
# ──────────────────────────────────────────────────────────────

# ─── Model ────────────────────────────────────────────────────
model:
  base_model: "models/sft_checkpoint"   # start from SFT output
  max_seq_length: 4096
  load_in_4bit: true
  dtype: "float16"

# ─── LoRA ─────────────────────────────────────────────────────
lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

# ─── Data ─────────────────────────────────────────────────────
data:
  train_file: "data/raft/train.jsonl"
  val_file: "data/raft/val.jsonl"
  format: "openai_messages"
  chat_template: "mistral"

# ─── Training ─────────────────────────────────────────────────
# RAFT sequences are 3000-4000 tokens (oracle + distractors).
# batch_size=2 + grad_accum=16 to avoid OOM on 24GB VRAM.
training:
  num_epochs: 2
  per_device_train_batch_size: 8      # A6000 48GB handles long sequences
  gradient_accumulation_steps: 4      # effective batch size = 32
  learning_rate: 5.0e-5               # lower LR for continued training
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  weight_decay: 0.01
  max_grad_norm: 1.0
  fp16: true
  seed: 42

# ─── Eval ─────────────────────────────────────────────────────
eval:
  eval_strategy: "steps"
  eval_steps: 100
  save_strategy: "steps"
  save_steps: 200
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"

# ─── RAFT Validation Thresholds ──────────────────────────────
# All three must be >= 0.80 to proceed to DPO
raft_thresholds:
  oracle_citation_rate: 0.80
  distractor_rejection_rate: 0.80
  abstention_rate: 0.80

# ─── Output ───────────────────────────────────────────────────
output:
  output_dir: "models/raft_checkpoint"
  logging_dir: "models/raft_checkpoint/logs"
  logging_steps: 10

# ─── W&B (optional) ──────────────────────────────────────────
wandb:
  enabled: false
  project: "alvinai-raft"
  run_name: null
