# ──────────────────────────────────────────────────────────────
# AlvinAI — SFT Training Configuration
# Stage 1 of 3: Supervised Fine-Tuning on automotive + HR data
# ──────────────────────────────────────────────────────────────

# ─── Model ────────────────────────────────────────────────────
model:
  base_model: "Qwen/Qwen3-14B"
  max_seq_length: 8192
  load_in_4bit: true          # QLoRA — NF4 quantization during training
  dtype: "bfloat16"           # compute dtype for LoRA layers (A6000 supports bf16)

# ─── LoRA ─────────────────────────────────────────────────────
lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

# ─── Data ─────────────────────────────────────────────────────
data:
  train_file: "data/v1/sft/train.jsonl"
  val_file: "data/v1/sft/val.jsonl"
  format: "openai_messages"   # {"messages": [{"role":...,"content":...}]}
  chat_template: "qwen"    # <s>[INST] {prompt} [/INST] {response}</s>

# ─── Training ─────────────────────────────────────────────────
training:
  num_epochs: 3
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 16    # effective batch size = 32
  learning_rate: 1.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  weight_decay: 0.01
  max_grad_norm: 1.0
  bf16: true
  seed: 42

# ─── Eval ─────────────────────────────────────────────────────
eval:
  eval_strategy: "steps"
  eval_steps: 100
  save_strategy: "steps"
  save_steps: 200
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"

# ─── Output ───────────────────────────────────────────────────
output:
  output_dir: "experiments/qwen3-14b-v1/models/sft_checkpoint"
  logging_dir: "experiments/qwen3-14b-v1/models/sft_checkpoint/logs"
  logging_steps: 10

# ─── W&B (optional) ──────────────────────────────────────────
wandb:
  enabled: false              # set true + WANDB_API_KEY env var on RunPod
  project: "alvinai-training"
  run_name: "qwen3-14b-v1-sft"              # auto-generated if null
  group: "qwen3-14b-v1"
  tags: ["qwen3-14b", "sft", "v1"]
