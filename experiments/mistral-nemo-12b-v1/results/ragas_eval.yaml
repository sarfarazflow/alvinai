findings: |
  Scores are below targets, but this is expected for several reasons:

  1. NO RAG PIPELINE — model was evaluated standalone with only a short
     reference context snippet, not full retrieval with top-5 chunks.
     Production will use dense+sparse retrieval → reranker → top-5 docs.

  2. DOMAIN MISMATCH — eval data was generated from Wikipedia corpus docs,
     but model was trained on company-specific synthetic data (HR policies,
     TSBs, vendor contracts). The model knows how to answer in its trained
     format but the eval questions use different terminology.

  3. TEMPLATE-BASED SCORING — keyword overlap metrics undercount semantic
     similarity. A correct paraphrased answer scores low because it uses
     different words than the reference. LLM-based judges (GPT-4, Claude)
     would score higher for semantically equivalent answers.

  Namespace patterns make sense:
  - vendor (0.703 faith) and employee_hr (0.689 faith) score highest because
    the training data had strong representation in these domains
  - customer_support (0.110 faith) scores lowest — eval questions are about
    vehicle recalls/warranties from NHTSA data, very different from the
    training data's customer support format

  These scores will improve significantly when:
  a) Evaluated through the full RAG pipeline (retriever + reranker)
  b) Eval data matches the training domain (company docs, not Wikipedia)
  c) LLM-based judge replaces keyword overlap scoring
