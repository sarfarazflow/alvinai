  steps_per_second: 0.059

observations: |
  DPO training completed successfully in ~18 minutes.
  Strong preference learning:
  - Reward accuracy reached 100% on train, 99.8% on eval
  - Large reward margins (18.55 train, 17.87 eval) — model strongly
    distinguishes chosen vs rejected responses
  - Loss dropped from 0.067 to 0.009 over 63 steps
  - No signs of reward hacking — eval metrics track train closely

  The model has learned clear preferences for:
  - Correct citation format (##begin_quote##)
  - Factual accuracy over fabrication
  - Appropriate abstention when context is insufficient
  - Namespace-appropriate tone

  Saved: LoRA adapter (218MB) + merged 16-bit model (9.2GB, 5 shards)
  Next: RAGAS evaluation, then AWQ quantization for production.
