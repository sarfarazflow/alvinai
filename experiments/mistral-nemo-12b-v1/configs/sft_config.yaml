# ──────────────────────────────────────────────────────────────
# AlvinAI — SFT Training Configuration
# Stage 1 of 3: Supervised Fine-Tuning on automotive + HR data
# ──────────────────────────────────────────────────────────────

# ─── Model ────────────────────────────────────────────────────
model:
  base_model: "mistralai/Mistral-Nemo-Instruct-2407"
  max_seq_length: 4096              # reduced from 8192 for A10 24GB VRAM
  load_in_4bit: true          # QLoRA — NF4 quantization during training
  dtype: "bfloat16"           # compute dtype for LoRA layers

# ─── LoRA ─────────────────────────────────────────────────────
lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

# ─── Data ─────────────────────────────────────────────────────
data:
  train_file: "data/v2/sft/train.jsonl"
  val_file: "data/v2/sft/val.jsonl"
  format: "openai_messages"   # {"messages": [{"role":...,"content":...}]}
  chat_template: "mistral"    # <s>[INST] {prompt} [/INST] {response}</s>

# ─── Training ─────────────────────────────────────────────────
training:
  num_epochs: 3
  per_device_train_batch_size: 4        # A6000 48GB has headroom for batch=4
  gradient_accumulation_steps: 8     # effective batch size = 32
  learning_rate: 1.5e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  weight_decay: 0.01
  max_grad_norm: 1.0
  bf16: true
  seed: 42

# ─── Eval ─────────────────────────────────────────────────────
eval:
  eval_strategy: "steps"
  eval_steps: 100
  save_strategy: "steps"
  save_steps: 200
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"

# ─── Output ───────────────────────────────────────────────────
output:
  output_dir: "experiments/mistral-nemo-12b-v1/models/sft_checkpoint"
  logging_dir: "experiments/mistral-nemo-12b-v1/models/sft_checkpoint/logs"
  logging_steps: 10

# ─── W&B (optional) ──────────────────────────────────────────
wandb:
  enabled: true               # set WANDB_API_KEY env var before training
  project: "alvinai-training"
  run_name: "mistral-nemo-12b-v1-sft"              # auto-generated if null
  group: "mistral-nemo-12b-v1"
  tags: ["mistral-nemo-12b", "sft", "v2", "azure", "a10"]
